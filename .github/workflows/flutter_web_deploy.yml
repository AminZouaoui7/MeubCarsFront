name: Flutter Web Build & Deploy to Render

on:
  push:
    branches:
      - main

permissions:
  contents: write  # Autorise la création/push de la branche deploy

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: 🔨 Build Flutter Web (Final stable)
        run: |
          flutter config --no-analytics
          flutter pub get
          flutter build web --release --no-tree-shake-icons --pwa-strategy=none

      - name: Deploy to GitHub Pages (Render deploy branch)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin
          git switch --orphan deploy
          rm -rf *
          cp -r build/web/* .
          git add .
          git commit -m "Deploy Flutter Web build"
          git push --force origin deploy