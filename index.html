<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="MeubCars — Fleet Management Platform">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="MeubCars">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>MeubCars</title>
  <link rel="manifest" href="manifest.json">

  <!-- 🔒 Global Auth Guard (runs before Flutter loads) -->
  <script>
    (function() {
      try {
        const token = localStorage.getItem('token');
        const hash = (window.location.hash || '').toLowerCase();

        const publicRoutes = ['#/login', '#/', ''];
        const isPublic = publicRoutes.some(p => hash === p || hash.startsWith(p));
        const hasToken = token && token.trim() !== '' && token !== 'null';

        if (!hasToken && !isPublic) {
          console.warn('🔒 No valid token — redirecting to /login');
          window.location.replace('/#/login');
        }

        // Optional: auto-redirect logged-in users away from /login
        if (hasToken && hash.startsWith('#/login')) {
          console.info('✅ Logged in — skipping login page');
          window.location.replace('/#/home');
        }
      } catch (e) {
        console.error('Auth check error:', e);
      }
    })();
  </script>

</head>

<body>
<script src="flutter_bootstrap.js" async></script>
</body>
</html>
