<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="MeubCars — Fleet Management Platform">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="MeubCars">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>MeubCars</title>
  <link rel="manifest" href="manifest.json">

  <!-- 🔒 Global Auth Guard (Flutter Web) -->
  <script>
    (function() {
      try {
        const token = localStorage.getItem('token');
        const path = (window.location.hash || '').toLowerCase();

        // Pages that require authentication
        const protectedPaths = [
          '/home',
          '/voitures',
          '/chauffeurs',
          '/societes',
          '/paiements',
          '/missions',
          '/superadmin',
          '/profile',
          '/settings'
        ];

        const isProtected = protectedPaths.some(p => path.includes(p));

        if ((!token || token === 'null' || token.trim() === '') && isProtected) {
          console.warn('🔒 No valid token detected — redirecting to /login');
          window.location.href = '/#/login';
        }
      } catch (e) {
        console.error('Auth check error:', e);
      }
    })();
  </script>
</head>

<body>
<script src="flutter_bootstrap.js" async></script>
</body>
</html>
